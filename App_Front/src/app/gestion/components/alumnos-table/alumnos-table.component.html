<div class="table-wrapper mat-elevation-z2">
  <table mat-table [dataSource]="dataSource">
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Alumno</th>
      <td mat-cell *matCellDef="let alumno">
        {{ alumno.perfilInfo?.nombres }} {{ alumno.perfilInfo?.apellidos }}
      </td>
    </ng-container>

    <ng-container matColumnDef="empresa">
      <th mat-header-cell *matHeaderCellDef>Empresa</th>
      <td mat-cell *matCellDef="let alumno">{{ alumno.empresa?.nombre }}</td>
    </ng-container>

    <ng-container matColumnDef="programa">
      <th mat-header-cell *matHeaderCellDef>Programa</th>
      <td mat-cell *matCellDef="let alumno">
        {{ obtenerProgramaNombre(alumno) }}
      </td>
    </ng-container>

    <ng-container matColumnDef="fecha">
      <th mat-header-cell *matHeaderCellDef>Registro</th>
      <td mat-cell *matCellDef="let alumno">
        {{ alumno.createdAt | date: "dd/MM/yyyy" }}
      </td>
    </ng-container>

    <ng-container matColumnDef="estatus">
      <th mat-header-cell *matHeaderCellDef>Estatus</th>
      <td mat-cell *matCellDef="let alumno">
        @let estatus = obtenerEstatusActual(alumno);
        <span class="badge" [ngClass]="estatus.toLowerCase().replace(' ', '-')">
          {{ estatus }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef class="actions-header">Acciones</th>
      <td mat-cell *matCellDef="let alumno" class="actions-cell">
        <button mat-icon-button (click)="verPerfil(alumno)" type="button">
          <mat-icon>visibility</mat-icon>
        </button>
        <button
          mat-icon-button
          color="warn"
          (click)="abrirCambioEstatus(alumno)"
          type="button"
        >
          <mat-icon>published_with_changes</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator
    [pageSizeOptions]="[5, 10, 20]"
    pageSize="10"
    showFirstLastButtons
  ></mat-paginator>
</div>
